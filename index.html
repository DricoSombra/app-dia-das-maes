<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dia das Mães | Ari de Sá</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --brand-blue: #0056b3;
            --brand-gold: #d4af37;
        }

        body {
            background-color: #0f172a;
            font-family: 'Montserrat', sans-serif;
            color: #f8fafc;
            overflow: hidden;
            height: 100dvh;
        }

        /* Container da Câmera estilo iPhone */
        .camera-viewport {
            position: relative;
            width: 100%;
            height: 65%;
            background: #000;
            overflow: hidden;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        video.rear { transform: scaleX(1); }

        /* Botão de Captura Estilizado */
        .shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            padding: 5px;
            border: 4px solid rgba(255,255,255,0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shutter-btn:active {
            transform: scale(0.85);
            background: #e2e8f0;
        }

        .shutter-inner {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
        }

        /* Seletor de Molduras Lateral */
        .frame-chip {
            flex: 0 0 70px;
            height: 70px;
            border-radius: 12px;
            border: 2px solid transparent;
            overflow: hidden;
            background: #1e293b;
            transition: all 0.3s;
        }

        .frame-chip.active {
            border-color: var(--brand-blue);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 86, 179, 0.4);
        }

        .fancy-font { font-family: 'Dancing Script', cursive; }

        .custom-frame-input {
            display: none;
        }

        /* Scrollbar Invisível */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header Flutuante -->
    <header class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50 pointer-events-none">
        <div class="bg-black/20 backdrop-blur-md p-3 rounded-2xl border border-white/10">
            <h1 class="text-white text-xs font-bold tracking-tighter uppercase">Momento <span class="text-blue-400">Ari de Sá</span></h1>
        </div>
        <img src="logo.png" alt="Logo" class="h-8 object-contain pointer-events-auto" onerror="this.style.display='none'">
    </header>

    <!-- Câmera -->
    <section class="camera-viewport relative">
        <video id="video" autoplay playsinline muted></video>
        <div id="overlay-container" class="absolute inset-0 pointer-events-none z-10"></div>
        
        <!-- Alerta de Erro -->
        <div id="camera-error" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-40 hidden p-10 text-center">
            <div class="bg-red-500/20 p-4 rounded-full mb-4">⚠️</div>
            <p class="text-sm font-semibold">Câmera não encontrada</p>
            <p class="text-xs text-slate-400 mt-2">Certifique-se de usar HTTPS e dar as permissões necessárias.</p>
        </div>
    </section>

    <!-- Controles Inferiores -->
    <main class="flex-grow flex flex-col justify-between p-6 bg-slate-900">
        
        <!-- Lista de Molduras -->
        <div class="flex items-center gap-4 overflow-x-auto no-scrollbar py-2" id="frame-list">
            <!-- Botão Adicionar Custom -->
            <label class="frame-chip flex flex-col items-center justify-center cursor-pointer border-dashed border-slate-700 bg-transparent hover:bg-white/5">
                <input type="file" class="custom-frame-input" id="add-frame" accept="image/png">
                <span class="text-xl">+</span>
                <span class="text-[8px] font-bold">MOLDURA</span>
            </label>
        </div>

        <!-- Barra de Ações Principal -->
        <div class="flex items-center justify-between mt-4">
            <!-- Inverter Câmera -->
            <button id="switch-camera" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-800 text-white active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>

            <!-- BOTÃO DE TIRAR FOTO -->
            <button id="capture" class="shutter-btn">
                <div class="shutter-inner"></div>
            </button>

            <div class="w-12 h-12"></div> <!-- Espaçador -->
        </div>
    </main>

    <!-- Modal de Resultado (Foto Pronta) -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center p-6 backdrop-blur-xl">
        <div class="relative w-full max-w-sm mb-8">
            <img id="photo-preview" class="w-full rounded-3xl shadow-2xl border-2 border-white/20" src="" alt="Sua Foto">
            <button id="close-modal" class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <button id="download-btn" class="w-full max-w-xs bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95">
            BAIXAR FOTO
        </button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const overlayContainer = document.getElementById('overlay-container');
        const frameList = document.getElementById('frame-list');
        const modal = document.getElementById('modal');
        const photoPreview = document.getElementById('photo-preview');
        const cameraError = document.getElementById('camera-error');

        let currentStream;
        let useFrontCamera = true;
        let selectedFrameIndex = 0;
        let customFrames = [];

        const COLORS = { blue: '#0056b3', gold: '#c5a059', pink: '#ff6b6b' };
        const LOGO = "logo.png";

        // MOLDURAS ESTILIZADAS (SVG)
        const PRESET_FRAMES = [
            { 
                name: "Minimal", 
                svg: `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="340" width="300" height="60" fill="${COLORS.blue}" />
                    <text x="150" y="375" font-family="Montserrat" font-weight="800" font-size="16" fill="white" text-anchor="middle" letter-spacing="2">DIA DAS MÃES</text>
                    <image href="${LOGO}" x="135" y="315" height="30" width="30" />
                </svg>`
            },
            { 
                name: "Love", 
                svg: `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                    <path d="M150 380 Q100 340 100 300 A30 30 0 0 1 160 300 A30 30 0 0 1 220 300 Q220 340 150 380" fill="${COLORS.pink}" opacity="0.8" />
                    <text x="150" y="385" font-family="Dancing Script" font-size="22" fill="white" text-anchor="middle">Te amo, Mamãe!</text>
                    <rect x="0" y="0" width="300" height="10" fill="${COLORS.blue}" />
                </svg>`
            },
            { 
                name: "Artística", 
                svg: `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                    <rect x="15" y="15" width="270" height="370" fill="none" stroke="${COLORS.gold}" stroke-width="4" rx="20" />
                    <circle cx="20" cy="20" r="10" fill="${COLORS.blue}" />
                    <circle cx="280" cy="380" r="10" fill="${COLORS.blue}" />
                    <text x="150" y="375" font-family="Montserrat" font-weight="600" font-size="10" fill="${COLORS.gold}" text-anchor="middle">ARI DE SÁ - 2024</text>
                </svg>`
            },
            { 
                name: "Polaroid", 
                svg: `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="0" width="300" height="400" fill="none" stroke="white" stroke-width="30" />
                    <rect x="0" y="320" width="300" height="80" fill="white" />
                    <text x="150" y="365" font-family="Dancing Script" font-size="24" fill="#333" text-anchor="middle">Nossa melhor foto</text>
                </svg>`
            }
        ];

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFrontCamera ? "user" : "environment" }
                });
                video.srcObject = currentStream;
                video.className = useFrontCamera ? "" : "rear";
                cameraError.classList.add('hidden');
            } catch (err) {
                cameraError.classList.remove('hidden');
            }
        }

        function renderFrameSelectors() {
            const allFrames = [...PRESET_FRAMES, ...customFrames];
            frameList.querySelectorAll('.frame-chip:not([label])').forEach(el => el.remove());

            allFrames.forEach((frame, index) => {
                const div = document.createElement('div');
                div.className = `frame-chip ${index === selectedFrameIndex ? 'active' : ''} flex-shrink-0 cursor-pointer relative`;
                
                if (frame.svg) {
                    div.innerHTML = `<div class="scale-[0.2] absolute -top-24 -left-28">${frame.svg}</div>`;
                } else if (frame.imageUrl) {
                    div.innerHTML = `<img src="${frame.imageUrl}" class="w-full h-full object-cover">`;
                }

                div.onclick = () => selectFrame(index);
                frameList.insertBefore(div, frameList.lastElementChild);
            });
        }

        function selectFrame(index) {
            selectedFrameIndex = index;
            document.querySelectorAll('.frame-chip').forEach((el, i) => el.classList.toggle('active', i === index));
            
            const allFrames = [...PRESET_FRAMES, ...customFrames];
            const current = allFrames[index];

            if (current.svg) {
                overlayContainer.innerHTML = current.svg;
            } else {
                overlayContainer.innerHTML = `<img src="${current.imageUrl}" class="w-full h-full object-contain">`;
            }
        }

        // Lógica para Adicionar Moldura Própria
        document.getElementById('add-frame').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    customFrames.push({ name: "Custom", imageUrl: event.target.result });
                    renderFrameSelectors();
                    selectFrame(PRESET_FRAMES.length + customFrames.length - 1);
                };
                reader.readAsDataURL(file);
            }
        };

        async function capturePhoto() {
            canvas.width = 1080;
            canvas.height = 1440;
            const ctx = canvas.getContext('2d');

            // 1. Desenhar Câmera
            ctx.save();
            if (useFrontCamera) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoAspect = vWidth / vHeight;
            const canvasAspect = canvas.width / canvas.height;
            let dw, dh, ox, oy;

            if (videoAspect > canvasAspect) {
                dh = canvas.height; dw = vWidth * (canvas.height / vHeight);
                ox = -(dw - canvas.width) / 2; oy = 0;
            } else {
                dw = canvas.width; dh = vHeight * (canvas.width / vWidth);
                ox = 0; oy = -(dh - canvas.height) / 2;
            }
            
            ctx.drawImage(video, ox, oy, dw, dh);
            ctx.restore();

            // 2. Desenhar Moldura
            const currentFrame = [...PRESET_FRAMES, ...customFrames][selectedFrameIndex];
            
            if (currentFrame.svg) {
                const svgData = new XMLSerializer().serializeToString(overlayContainer.querySelector('svg'));
                const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(svgBlob);
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    showResult();
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            } else {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    showResult();
                };
                img.src = currentFrame.imageUrl;
            }
        }

        function showResult() {
            photoPreview.src = canvas.toDataURL('image/jpeg', 0.9);
            modal.classList.remove('hidden');
        }

        document.getElementById('capture').onclick = capturePhoto;
        document.getElementById('switch-camera').onclick = () => { useFrontCamera = !useFrontCamera; startCamera(); };
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('download-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = `Mae_AriDeSa_${Date.now()}.jpg`;
            link.href = photoPreview.src;
            link.click();
        };

        window.onload = () => { 
            startCamera(); 
            renderFrameSelectors(); 
            selectFrame(0); 
        };
    </script>
</body>
</html>
