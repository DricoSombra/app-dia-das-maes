<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag essencial para inibir o scaling automático em iOS/Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Colégio Ari de Sá - Dia da Mãe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ariBlue: '#00529b',
                        ariBlueDark: '#002a5c',
                        motherPink: '#e91e63',
                        motherPinkLight: '#ff4081',
                        goldRef: '#FFD700',
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Fundamentos e Mitigação do Viewport Mobile */
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            /* Fallback para vh, mas preferência por dvh (Dynamic Viewport Height) */
            height: 100vh; height: 100dvh; 
            overflow: hidden; background-color: #000; 
            font-family: system-ui, -apple-system, sans-serif; 
            touch-action: none; overscroll-behavior: none; 
        }
        
        .viewport-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        /* Óptica da Câmara (Preservando a mitigação de Zoom anterior) */
        #videoElement { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #frameOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 10; pointer-events: none; }
        
        /* Painéis UI */
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 255, 255, 0.15); z-index: 20; }
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 20; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; z-index: 20; padding-bottom: max(env(safe-area-inset-bottom), 10px); }

        /* Botões de Ação Refatorados */
        .action-btn { 
            width: 44px; height: 44px; border-radius: 50%; 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); 
            color: white; display: flex; justify-content: center; align-items: center; 
            border: 1px solid rgba(255,255,255,0.2); font-size: 1.1rem; cursor: pointer; transition: background 0.2s; 
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.4); }
        
        /* Botão Maior de Câmara (Lei de Fitts) */
        .camera-flip-btn {
            width: 60px; height: 60px; font-size: 1.6rem; 
            background: rgba(0, 82, 155, 0.6); border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Obturador Fotográfico Centralizado */
        .shutter-btn-container { display: flex; justify-content: center; align-items: center; padding: 1rem 0; width: 100%; }
        .shutter-btn { width: 70px; height: 70px; border-radius: 50%; background-color: transparent; border: 4px solid white; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.15s; }
        .shutter-btn-inner { width: 56px; height: 56px; border-radius: 50%; background-color: white; transition: all 0.15s ease; }
        .shutter-btn:active .shutter-btn-inner { transform: scale(0.85); background-color: #ddd; }

        /* Carrossel Compacto */
        .carousel-container { padding: 0.5rem 1rem 0 1rem; width: 100%; }
        .frames-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scroll-behavior: smooth; scrollbar-width: none; }
        .frames-scroll::-webkit-scrollbar { display: none; }
        .thumb-wrapper { position: relative; flex-shrink: 0; transition: transform 0.2s ease; }
        .frame-thumb { width: 56px; height: 84px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); cursor: pointer; }
        .thumb-wrapper.active .frame-thumb { border-color: #FFD700; box-shadow: 0 0 0 2px #0f172a, 0 0 0 4px #FFD700; transform: translateY(-4px); }

        /* Gestão de Eliminação */
        .delete-badge { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background-color: #ef4444; color: white; display: none; justify-content: center; align-items: center; font-size: 10px; cursor: pointer; border: 2px solid #0f172a; z-index: 30; }
        /* Permite eliminação de QUALQUER frame no modo admin */
        .admin-mode .delete-badge { display: flex; }
        
        .admin-panel { display: none; padding: 0.5rem 1rem; background: rgba(0, 82, 155, 0.95); color: white; font-size: 0.8rem; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.2); }
        .admin-mode .admin-panel { display: flex; }

        /* Preview (Heurística de Controlo) */
        #previewScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 50; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #previewScreen.active { opacity: 1; pointer-events: auto; }
        #previewImage { flex: 1; width: 100%; object-fit: contain; background: #111; }
        .preview-controls { display: flex; justify-content: space-around; padding: 1.5rem; background: #0f172a; border-top: 1px solid #333; padding-bottom: max(env(safe-area-inset-bottom), 1.5rem); }
        .btn-preview { padding: 0.8rem 1.8rem; border-radius: 30px; font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn-discard { background: #334155; color: white; }
        .btn-save { background: #e91e63; color: white; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4); }

        #flashEffect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; opacity: 0; pointer-events: none; }
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.5s; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        #svgRepository { display: none; }
    </style>
</head>
<body>

    <!-- REPOSITÓRIO VETORIAL (Semiótica estritamente validada - Ausência de Verde) -->
    <div id="svgRepository">
        
        <!-- 0. Estilo Scrapbook (Mantido por instrução implícita de qualidade visual aprovada) -->
        <svg id="svg-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <filter id="scrapShadow0"><feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/></filter>
                <filter id="goldGlow0"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFD700" flood-opacity="0.6"/></filter>
                <g id="flower-pink" filter="url(#scrapShadow0)">
                    <path d="M0,0 C15,-30 45,-30 60,0 C75,-30 105,-30 120,0 C120,30 60,75 60,75 C60,75 0,30 0,0 Z" fill="#e91e63" transform="translate(-60, -30) scale(0.8)"/>
                    <path d="M0,0 C15,-30 45,-30 60,0 C75,-30 105,-30 120,0 C120,30 60,75 60,75 C60,75 0,30 0,0 Z" fill="#ff4081" transform="translate(-60, -30) scale(0.6) rotate(45)"/>
                    <circle cx="0" cy="10" r="12" fill="#FFD700" />
                </g>
                <g id="flower-yellow" filter="url(#scrapShadow0)">
                    <path d="M0,-40 C30,-40 30,0 0,0 C-30,0 -30,-40 0,-40 Z" fill="#FFD700" transform="rotate(0)"/>
                    <path d="M0,-40 C30,-40 30,0 0,0 C-30,0 -30,-40 0,-40 Z" fill="#FFD700" transform="rotate(72)"/>
                    <path d="M0,-40 C30,-40 30,0 0,0 C-30,0 -30,-40 0,-40 Z" fill="#FFD700" transform="rotate(144)"/>
                    <path d="M0,-40 C30,-40 30,0 0,0 C-30,0 -30,-40 0,-40 Z" fill="#FFD700" transform="rotate(216)"/>
                    <path d="M0,-40 C30,-40 30,0 0,0 C-30,0 -30,-40 0,-40 Z" fill="#FFD700" transform="rotate(288)"/>
                    <circle cx="0" cy="0" r="15" fill="#e91e63" />
                </g>
                <g id="leaf" filter="url(#scrapShadow0)"><path d="M0,0 C30,-20 50,0 60,30 C30,50 10,30 0,0 Z" fill="#00529b"/></g>
            </defs>
            <rect x="0" y="0" width="1080" height="1920" fill="none" stroke="#e91e63" stroke-width="120" filter="url(#scrapShadow0)"/>
            <rect x="50" y="50" width="980" height="1820" fill="none" stroke="#ff4081" stroke-width="20" stroke-dasharray="30,15"/>
            <text x="120" y="220" font-family="'Brush Script MT', cursive" font-size="160" font-weight="bold" fill="#FFD700" filter="url(#goldGlow0)" transform="rotate(-10 120 220)">Mãe</text>
            <g transform="translate(850, 150) rotate(15)">
                <path d="M0,30 C-30,0 -50,-30 -30,-50 C-10,-70 10,-50 20,-30 C30,-50 50,-70 70,-50 C90,-30 70,0 40,30 L20,50 Z" fill="none" stroke="#ffffff" stroke-width="14" stroke-dasharray="0, 16" stroke-linecap="round" filter="url(#scrapShadow0)"/>
            </g>
            <rect x="0" y="1600" width="1080" height="320" fill="#e91e63" filter="url(#scrapShadow0)"/>
            <text x="540" y="1850" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#scrapShadow0)">COLÉGIO ARI DE SÁ</text>
            <use href="#leaf" x="120" y="1650" transform="rotate(-30 120 1650) scale(1.5)" />
            <use href="#leaf" x="300" y="1720" transform="rotate(45 300 1720) scale(1.3)" />
            <use href="#leaf" x="780" y="1680" transform="rotate(-60 780 1680) scale(1.5)" />
            <use href="#flower-pink" x="200" y="1680" transform="scale(1.5)"/>
            <use href="#flower-yellow" x="400" y="1700" transform="scale(1.8)"/>
            <use href="#flower-pink" x="650" y="1720" transform="scale(1.6)"/>
            <use href="#leaf" x="60" y="600" transform="rotate(45 60 600)" />
            <use href="#flower-yellow" x="60" y="550" transform="scale(1.2)"/>
        </svg>

        <!-- 1. Clássica Minimalista -->
        <svg id="svg-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs><filter id="shadowLight1"><feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/></filter></defs>
            <path d="M0,0 L1080,0 L1080,1920 L0,1920 Z M60,150 L60,1500 L1020,1500 L1020,150 Z" fill="#ffffff" filter="url(#shadowLight1)"/>
            <rect x="420" y="20" width="240" height="50" fill="#f3f4f6" opacity="0.8" transform="rotate(-1 540 45)" filter="url(#shadowLight1)"/>
            <path d="M400,1650 C380,1620 330,1630 330,1670 C330,1710 400,1760 400,1760 C400,1760 470,1710 470,1670 C470,1630 420,1620 400,1650 Z" fill="#ff4081" opacity="0.6"/>
            <path d="M680,1620 C660,1590 610,1600 610,1640 C610,1680 680,1730 680,1730 C680,1730 750,1680 750,1640 C750,1600 700,1590 680,1620 Z" fill="#00529b" opacity="0.4"/>
            <text x="540" y="1740" font-family="'Brush Script MT', cursive" font-size="100" fill="#e91e63" text-anchor="middle">Feliz Dia da Mãe</text>
            <text x="540" y="1840" font-family="system-ui, sans-serif" font-size="35" font-weight="700" fill="#00529b" text-anchor="middle" letter-spacing="2">ARI DE SÁ</text>
        </svg>

        <!-- 2. Envelope de Corações (Geometria Subtrativa - Buraco Central Transparente) -->
        <svg id="svg-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#d81b60"/>
                </linearGradient>
                <filter id="shadow2"><feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/></filter>
                <g id="solidHeart"><path d="M0,20 C-20,0 -40,-20 -20,-40 C-10,-50 10,-30 20,-20 C30,-30 50,-50 60,-40 C80,-20 60,0 40,20 L20,40 Z" fill="#900C3F"/></g>
            </defs>
            
            <!-- APLICAÇÃO DO EVEN-ODD: Desenha a moldura sólida e vaza o retângulo (100,180) ao (980,1400) -->
            <path d="M0,0 H1080 V1920 H0 Z M100,180 V1400 H980 V180 Z" fill="url(#bgGrad2)" fill-rule="evenodd"/>
            <rect x="90" y="170" width="900" height="1240" fill="none" stroke="#fff" stroke-width="20" rx="10"/>
            
            <!-- Corações Periféricos -->
            <use href="#solidHeart" x="900" y="400" transform="scale(1.5) rotate(15)"/>
            <use href="#solidHeart" x="200" y="150" transform="scale(0.8) rotate(-20)"/>
            <use href="#solidHeart" x="800" y="100" transform="scale(1.2) rotate(30)"/>
            
            <!-- Envelope Aberto Inferior Esquerdo -->
            <g transform="translate(10, 1400) rotate(-15)" filter="url(#shadow2)">
                <path d="M0,0 L500,0 L500,300 L0,300 Z" fill="#ffffff"/>
                <!-- Corações a sair -->
                <use href="#solidHeart" x="200" y="-50" transform="scale(1.2)"/>
                <use href="#solidHeart" x="350" y="50" transform="scale(1.8)"/>
                <use href="#solidHeart" x="280" y="-120" transform="scale(0.9)"/>
                <!-- Abas do envelope -->
                <path d="M0,300 L250,150 L500,300" fill="#f3f4f6" stroke="#ddd" stroke-width="2"/>
                <path d="M0,0 L250,150 L500,0" fill="#e91e63" opacity="0.1"/>
            </g>
            
            <text x="600" y="1750" font-family="'Brush Script MT', cursive" font-size="90" fill="#ffffff" text-anchor="middle" filter="url(#shadow2)">Para a Mamã,</text>
            <text x="600" y="1840" font-family="'Brush Script MT', cursive" font-size="70" fill="#ffffff" text-anchor="middle" filter="url(#shadow2)">com muito amor!</text>
            <use href="#solidHeart" x="800" y="1700" transform="scale(1.4) rotate(15)"/>
        </svg>

        <!-- 3. Arabescos e Corações (Fundo puramente transparente) -->
        <svg id="svg-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <g id="arabHeart">
                    <path d="M0,15 C-15,0 -30,-15 -15,-30 C-5,-40 10,-20 15,-15 C20,-20 35,-40 45,-30 C60,-15 45,0 30,15 L15,30 Z" fill="#d00000"/>
                </g>
            </defs>
            <!-- Removido o <rect fill="#ffffff"> para permitir a passagem ótica -->
            <rect x="0" y="0" width="1080" height="1920" fill="none" stroke="#ffb3c6" stroke-width="60"/>
            
            <!-- Linhas Onduladas Vetoriais (Esquerda) -->
            <path d="M 50,50 C 150,150 -50,250 50,400 S 150,600 50,750 S -50,900 50,1050 S 150,1200 50,1350 S -50,1500 50,1650 S 150,1800 50,1870" fill="none" stroke="#d00000" stroke-width="4"/>
            <!-- Linhas Onduladas (Direita) -->
            <path d="M 1030,50 C 930,150 1130,250 1030,400 S 930,600 1030,750 S 1130,900 1030,1050 S 930,1200 1030,1350 S 1130,1500 1030,1650 S 930,1800 1030,1870" fill="none" stroke="#d00000" stroke-width="4"/>
            <!-- Linhas (Topo/Base) -->
            <path d="M 50,50 Q 250,-20 540,50 T 1030,50" fill="none" stroke="#d00000" stroke-width="4"/>
            <path d="M 50,1870 Q 250,1940 540,1870 T 1030,1870" fill="none" stroke="#d00000" stroke-width="4"/>

            <!-- Distribuição de Corações sobre as linhas -->
            <use href="#arabHeart" x="80" y="100" transform="scale(1.5)"/>
            <use href="#arabHeart" x="30" y="300" transform="scale(0.8)"/>
            <use href="#arabHeart" x="90" y="500" transform="scale(1.2)"/>
            <use href="#arabHeart" x="20" y="900" transform="scale(1)"/>
            <use href="#arabHeart" x="70" y="1500" transform="scale(1.8)"/>
            
            <use href="#arabHeart" x="950" y="200" transform="scale(1.2)"/>
            <use href="#arabHeart" x="1000" y="700" transform="scale(1.6)"/>
            <use href="#arabHeart" x="930" y="1100" transform="scale(0.9)"/>
            <use href="#arabHeart" x="970" y="1600" transform="scale(2)"/>
            
            <rect x="240" y="1750" width="600" height="120" fill="rgba(255,255,255,0.9)" rx="60"/>
            <text x="540" y="1825" font-family="system-ui, sans-serif" font-weight="800" font-size="45" fill="#00529b" text-anchor="middle">COLÉGIO ARI DE SÁ</text>
        </svg>

        <!-- 4. Pórtico/Arco (Geometria Topológica Curva com Buraco Arquitetónico) -->
        <svg id="svg-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <filter id="archShadow"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.2"/></filter>
            </defs>
            
            <!-- APLICAÇÃO DO EVEN-ODD: Desenha a caixa inteira Rosa e extrai um Arco Perfeito no centro -->
            <path d="M0,0 H1080 V1920 H0 Z M 80,1860 H 1000 V 700 A 460 460 0 0 0 80 700 Z" fill="#f8bbd0" fill-rule="evenodd"/>
            <path d="M 80,1860 H 1000 V 700 A 460 460 0 0 0 80 700 Z" fill="none" stroke="#ff8a80" stroke-width="15"/>
            
            <!-- Coração Gigante no Topo -->
            <g transform="translate(540, 250) scale(4)" filter="url(#archShadow)">
                <path d="M0,35 C-35,0 -70,-35 -35,-70 C-15,-90 15,-60 25,-45 C35,-60 65,-90 85,-70 C120,-35 85,0 50,35 L25,60 Z" fill="#fff9c4" stroke="#ffffff" stroke-width="3"/>
            </g>
            
            <text x="540" y="250" font-family="system-ui, sans-serif" font-size="90" font-weight="900" fill="#81d4fa" stroke="#ffffff" stroke-width="15" stroke-linejoin="round" text-anchor="middle">Feliz</text>
            <text x="540" y="250" font-family="system-ui, sans-serif" font-size="90" font-weight="900" fill="#81d4fa" text-anchor="middle">Feliz</text>
            
            <text x="540" y="320" font-family="system-ui, sans-serif" font-size="35" font-weight="700" fill="#000000" text-anchor="middle">dia das</text>
            
            <text x="540" y="460" font-family="system-ui, sans-serif" font-size="140" font-weight="900" fill="#f48fb1" stroke="#ffffff" stroke-width="25" stroke-linejoin="round" text-anchor="middle">MÃES</text>
            <text x="540" y="460" font-family="system-ui, sans-serif" font-size="140" font-weight="900" fill="#f48fb1" text-anchor="middle">MÃES</text>

            <text x="540" y="1800" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="#00529b" opacity="0.8" text-anchor="middle">ARI DE SÁ CAVALCANTE</text>
        </svg>

        <!-- 5. Estilo Comic Pop-Art (Perfuração do Padrão Halftone) -->
        <svg id="svg-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                    <circle cx="20" cy="20" r="4" fill="#00529b" opacity="0.1"/>
                </pattern>
                <g id="comicFlower">
                    <path d="M0,0 Q10,-30 20,0 Q50,10 20,20 Q10,50 0,20 Q-30,10 0,0 Z" fill="#ffb3c6" stroke="#000" stroke-width="4"/>
                    <circle cx="10" cy="10" r="6" fill="#FFD700" stroke="#000" stroke-width="3"/>
                </g>
            </defs>
            
            <!-- APLICAÇÃO DO EVEN-ODD: Fundo branco e Textura perfurados com precisão cirúrgica -->
            <path d="M0,0 H1080 V1920 H0 Z M 80,450 H 1000 V 1450 H 80 Z" fill="#ffffff" fill-rule="evenodd"/>
            <path d="M0,0 H1080 V1920 H0 Z M 80,450 H 1000 V 1450 H 80 Z" fill="url(#dots)" fill-rule="evenodd"/>
            
            <!-- Bordas interiores duplas da área de fotografia -->
            <rect x="70" y="440" width="940" height="1020" fill="none" stroke="#00d2ff" stroke-width="20"/>
            <rect x="90" y="460" width="900" height="980" fill="none" stroke="#e91e63" stroke-width="15"/>

            <!-- Tipografia Comic Topo -->
            <rect x="50" y="80" width="980" height="180" fill="#e91e63" rx="40" stroke="#000" stroke-width="8"/>
            <text x="540" y="210" font-family="'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="6" text-anchor="middle">FELIZ DIA</text>

            <path d="M280,350 L800,350 L770,480 L310,480 Z" fill="#00529b" stroke="#000" stroke-width="6"/>
            <text x="540" y="440" font-family="'Arial Black', Impact, sans-serif" font-size="90" font-weight="900" fill="#ffffff" stroke="#000" stroke-width="4" text-anchor="middle">DAS MÃES!</text>
            
            <!-- Selo Super -->
            <circle cx="150" cy="350" r="100" fill="#ffb3c6" stroke="#000" stroke-width="6"/>
            <text x="150" y="340" font-family="'Arial Black', sans-serif" font-size="35" fill="#fff" stroke="#000" stroke-width="2" text-anchor="middle" transform="rotate(-15 150 340)">SUPER</text>
            <text x="150" y="380" font-family="'Brush Script MT', cursive" font-size="50" fill="#000" text-anchor="middle" transform="rotate(-15 150 380)">Mãe</text>

            <!-- Rodapé Texto -->
            <text x="540" y="1600" font-family="'Arial Black', Impact, sans-serif" font-size="110" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="6" text-anchor="middle">VOCÊ É O MEU</text>
            <text x="540" y="1720" font-family="'Arial Black', Impact, sans-serif" font-size="90" font-weight="900" fill="#00d2ff" stroke="#000" stroke-width="6" text-anchor="middle">MELHOR PRESENTE!</text>
            <text x="540" y="1850" font-family="system-ui, sans-serif" font-size="40" font-weight="900" fill="#00529b" text-anchor="middle">ARI DE SÁ</text>

            <!-- Espalhar Flores -->
            <use href="#comicFlower" x="50" y="50" transform="scale(1.5)"/>
            <use href="#comicFlower" x="950" y="100" transform="scale(2)"/>
            <use href="#comicFlower" x="80" y="1700" transform="scale(2)"/>
            <use href="#comicFlower" x="900" y="1750" transform="scale(1.8)"/>
        </svg>

        <!-- 6. Grelha Margaridas Polaroid (Vazamento do Padrão Axonométrico) -->
        <svg id="svg-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <pattern id="gridPink" width="80" height="80" patternUnits="userSpaceOnUse">
                    <rect width="80" height="80" fill="#ffd1dc" />
                    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#f48fb1" stroke-width="2" />
                </pattern>
                <g id="daisy" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.3))">
                    <path d="M0,50 L-20,100 L-5,110 Z" fill="#64748b" stroke="#000" stroke-width="3"/>
                    <path d="M0,50 L20,90 L5,100 Z" fill="#64748b" stroke="#000" stroke-width="3"/>
                    
                    <g fill="#ffffff" stroke="#000" stroke-width="3">
                        <ellipse cx="0" cy="-35" rx="15" ry="35" />
                        <ellipse cx="0" cy="35" rx="15" ry="35" />
                        <ellipse cx="-35" cy="0" rx="35" ry="15" />
                        <ellipse cx="35" cy="0" rx="35" ry="15" />
                        <ellipse cx="-25" cy="-25" rx="15" ry="35" transform="rotate(45 -25 -25)" />
                        <ellipse cx="25" cy="25" rx="15" ry="35" transform="rotate(45 25 25)" />
                        <ellipse cx="25" cy="-25" rx="15" ry="35" transform="rotate(-45 25 -25)" />
                        <ellipse cx="-25" cy="25" rx="15" ry="35" transform="rotate(-45 -25 25)" />
                    </g>
                    <circle cx="0" cy="0" r="18" fill="#FFD700" stroke="#000" stroke-width="3"/>
                </g>
            </defs>

            <!-- APLICAÇÃO DO EVEN-ODD: Extração central para garantir a janela ótica -->
            <path d="M0,0 H1080 V1920 H0 Z M 100,170 H 980 V 1330 H 100 Z" fill="url(#gridPink)" stroke="#000" stroke-width="30" fill-rule="evenodd"/>
            <rect x="80" y="150" width="920" height="1200" fill="none" stroke="#000" stroke-width="40"/>
            
            <use href="#daisy" x="180" y="150" transform="scale(1.5)"/>
            <use href="#daisy" x="880" y="1300" transform="scale(2)"/>
            
            <!-- Etiqueta Branca Arredondada -->
            <path d="M200,1500 C200,1450 880,1450 880,1500 C880,1550 850,1700 800,1700 C750,1700 250,1700 200,1650 Z" fill="#ffffff" stroke="#000" stroke-width="6" filter="drop-shadow(2px 5px 0px rgba(0,0,0,0.2))"/>
            <text x="540" y="1560" font-family="system-ui, sans-serif" font-size="70" font-weight="900" fill="#000" text-anchor="middle">FELIZ DIA DAS</text>
            <text x="540" y="1650" font-family="'Brush Script MT', cursive" font-size="110" fill="#e91e63" text-anchor="middle">mães</text>
            
            <!-- Corações desenhados a mão livres -->
            <path d="M800,1550 C780,1530 750,1550 770,1580 L800,1610 L830,1580 C850,1550 820,1530 800,1550" fill="#ffb3c6" stroke="#000" stroke-width="4"/>
            
            <rect x="340" y="1750" width="400" height="80" fill="#00529b" rx="40" stroke="#000" stroke-width="4"/>
            <text x="540" y="1805" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">ARI DE SÁ</text>
        </svg>

    </div>

    <!-- Visão da Câmara Principal -->
    <div class="viewport-container" id="cameraView">
        <video id="videoElement" autoplay playsinline muted></video>
        <img id="frameOverlay" src="" alt="Moldura Ativa">

        <div class="top-bar">
            <!-- Fallback SVG incluído -->
            <img src="./logo.png" alt="Logotipo Ari de Sá" class="h-10 object-contain drop-shadow-md" 
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgNTAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iNTAiIGZpbGw9InRyYW5zcGFyZW50Ii8+PHRleHQgeD0iMTAiIHk9IjM1IiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjgiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjZmZmZmZmIj5BcmkgZGUgU8OhPC90ZXh0Pjwvc3ZnPg=='">
            
            <div class="flex gap-3">
                <!-- Botão de câmara aumentado drasticamente -->
                <button class="action-btn camera-flip-btn text-white" onclick="toggleCamera()" aria-label="Inverter Lente">
                    <i class="fas fa-camera-rotate"></i>
                </button>
                <button class="action-btn" onclick="requestAdminAccess()" id="adminToggleBtn" aria-label="Modo de Gestão">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>
        </div>

        <div class="bottom-bar glass-panel" id="bottomBarUI">
            <div class="admin-panel" id="adminPanel">
                <span class="font-bold tracking-wide uppercase"><i class="fas fa-shield-alt mr-2"></i>Gestor</span>
                <div class="flex gap-2">
                    <button class="px-4 py-1.5 bg-motherPink text-white rounded-full font-bold text-xs uppercase hover:bg-pink-600" onclick="triggerFileInput()">
                        <i class="fas fa-plus mr-1"></i> Nova
                    </button>
                    <input type="file" id="customFrameInput" accept="image/png, image/jpeg" class="hidden" onchange="handleCustomFrame(event)">
                </div>
            </div>

            <div class="carousel-container">
                <div class="frames-scroll" id="framesScroll"></div>
            </div>

            <div class="shutter-btn-container">
                <div class="shutter-btn" onclick="takeSnapshot()">
                    <div class="shutter-btn-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ecrã de Preview -->
    <div id="previewScreen">
        <img id="previewImage" src="" alt="Pré-visualização da Fotografia">
        <div class="preview-controls">
            <button class="btn-preview btn-discard" onclick="discardPhoto()">
                <i class="fas fa-undo"></i> Repetir
            </button>
            <button class="btn-preview btn-save" onclick="downloadPhoto()">
                <i class="fas fa-download"></i> Descarregar
            </button>
        </div>
    </div>

    <!-- Telas Ocultas -->
    <canvas id="renderCanvas" class="hidden"></canvas>
    <div id="flashEffect"></div>

    <div class="loader-overlay" id="loaderOverlay">
        <i class="fas fa-microchip text-5xl mb-4 text-ariBlue animate-pulse"></i>
        <h2 class="text-2xl font-bold mb-2">A Inicializar Sistema</h2>
        <p class="text-sm text-gray-400 max-w-xs text-center">Aguardando hardware óptico...</p>
    </div>

    <script>
        /**
         * ESTADOS GLOBAIS E GESTÃO DE DADOS LÓGICOS
         */
        const appState = {
            stream: null,
            facingMode: 'user', 
            isAdmin: false,
            activeIndex: 0,
            frames: [], // Coleção total ativa
            deletedDefaults: [], // Lista negra (Soft Deletes)
            currentPhotoDataUri: null
        };

        const DOM = {
            video: document.getElementById('videoElement'),
            overlay: document.getElementById('frameOverlay'),
            scroll: document.getElementById('framesScroll'),
            loader: document.getElementById('loaderOverlay'),
            flash: document.getElementById('flashEffect'),
            canvas: document.getElementById('renderCanvas'),
            fileInput: document.getElementById('customFrameInput'),
            previewScreen: document.getElementById('previewScreen'),
            previewImage: document.getElementById('previewImage')
        };

        const STORAGE_KEY = '@AriDeSa:CustomFrames_v4';

        window.addEventListener('DOMContentLoaded', async () => {
            initializeDataStore();
            renderCarousel();
            selectFrame(0);
            await initCamera();
        });

        // --- SISTEMA DE PERSISTÊNCIA E SOFT DELETION ---
        function initializeDataStore() {
            appState.frames = [];
            appState.deletedDefaults = [];

            // 1. Resgatar memória persistente
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed.custom) appState.frames = parsed.custom; // Arrays customizadas
                    if (parsed.deletedDefaults) appState.deletedDefaults = parsed.deletedDefaults; // Lista negra
                }
            } catch (e) { console.warn("Erro ao ler LocalStorage", e); }

            // 2. Montar SVGs base (se não estiverem na lista negra)
            const svgs = document.querySelectorAll('#svgRepository svg');
            
            // Array auxiliar para colocar os nativos na frente
            let nativeFrames = [];
            svgs.forEach((svg, index) => {
                const id = `default-${index}`;
                // Se a ID estiver na lista negra, ignoramos.
                if (!appState.deletedDefaults.includes(id)) {
                    const svgString = new XMLSerializer().serializeToString(svg);
                    const encodedData = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgString)}`;
                    nativeFrames.push({ id: id, type: 'default', uri: encodedData });
                }
            });

            // Concatena os nativos (não apagados) com os customizados resgatados
            appState.frames = [...nativeFrames, ...appState.frames.filter(f => f.type === 'custom')];
        }

        function saveDataState() {
            const customOnly = appState.frames.filter(f => f.type === 'custom');
            const dataToStore = {
                custom: customOnly,
                deletedDefaults: appState.deletedDefaults
            };
            try { 
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToStore)); 
            } catch (e) { alert("Memória esgotada."); }
        }

        // --- CARROSSEL ---
        function renderCarousel() {
            DOM.scroll.innerHTML = '';
            
            if(appState.frames.length === 0) {
                // Caso extremo: o administrador apagou tudo.
                DOM.overlay.src = "";
                return;
            }

            appState.frames.forEach((frame, index) => {
                const wrapper = document.createElement('div');
                // Removemos a restrição default-frame na deleção. Qualquer frame recebe o delete-badge no modo admin.
                wrapper.className = `thumb-wrapper ${index === appState.activeIndex ? 'active' : ''}`;
                
                const img = document.createElement('img');
                img.src = frame.uri;
                img.className = 'frame-thumb';
                img.onclick = () => selectFrame(index);
                
                const delBadge = document.createElement('div');
                delBadge.className = 'delete-badge';
                delBadge.innerHTML = '<i class="fas fa-times"></i>';
                delBadge.onclick = (e) => { e.stopPropagation(); deleteFrame(frame.id); };

                wrapper.appendChild(img);
                wrapper.appendChild(delBadge);
                DOM.scroll.appendChild(wrapper);
            });
        }

        function selectFrame(index) {
            if (appState.frames.length === 0) return;
            if (index < 0 || index >= appState.frames.length) index = 0;
            
            appState.activeIndex = index;
            DOM.overlay.src = appState.frames[index].uri;
            
            Array.from(DOM.scroll.children).forEach((child, i) => {
                child.classList.toggle('active', i === index);
                if (i === index) child.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        }

        // --- GESTÃO AUTENTICADA ---
        function requestAdminAccess() {
            // Se já for admin, apenas desliga.
            if(appState.isAdmin) {
                toggleAdminUI(false);
                return;
            }

            // Autenticação simples exigida
            const input = prompt("Acesso Restrito. Insira a senha de gestão:");
            if (input === "5631") {
                toggleAdminUI(true);
            } else if (input !== null) {
                alert("Senha incorreta.");
            }
        }

        function toggleAdminUI(status) {
            appState.isAdmin = status;
            document.body.classList.toggle('admin-mode', appState.isAdmin);
            const btn = document.getElementById('adminToggleBtn');
            btn.classList.toggle('bg-ariBlue', appState.isAdmin);
            btn.classList.toggle('text-white', appState.isAdmin);
        }

        function triggerFileInput() { DOM.fileInput.click(); }
        
        function handleCustomFrame(event) {
            const file = event.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                appState.frames.push({ id: `custom-${Date.now()}`, type: 'custom', uri: e.target.result });
                saveDataState(); renderCarousel(); selectFrame(appState.frames.length - 1);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function deleteFrame(id) {
            if (confirm("Tem a certeza de que deseja eliminar esta moldura?")) {
                const frameToDelete = appState.frames.find(f => f.id === id);
                
                // Se for moldura padrão, adiciona à lista negra de Deleção Lógica
                if (frameToDelete && frameToDelete.type === 'default') {
                    appState.deletedDefaults.push(id);
                }

                // Remove do array ativo em memória
                appState.frames = appState.frames.filter(f => f.id !== id);
                
                saveDataState(); 
                renderCarousel(); 
                selectFrame(0);
            }
        }

        // --- ÓPTICA WEBRTC (Mantendo a matemática rigorosa de mitigação de crop) ---
        async function initCamera() {
            if (appState.stream) {
                appState.stream.getTracks().forEach(track => track.stop());
            }

            // Overdrive do Sensor para máximo FoV horizontal
            const constraints = {
                video: {
                    facingMode: appState.facingMode,
                    width: { ideal: 4096 }, 
                    height: { ideal: 2160 }
                },
                audio: false
            };

            try {
                appState.stream = await navigator.mediaDevices.getUserMedia(constraints);
                startVideoStream();
            } catch (err) {
                try {
                    appState.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: appState.facingMode }, audio: false });
                    startVideoStream();
                } catch (fallbackErr) {
                    DOM.loader.innerHTML = `
                        <i class="fas fa-exclamation-triangle text-5xl mb-4 text-motherPink"></i>
                        <h2 class="text-2xl font-bold mb-2">Acesso Negado</h2>
                        <p class="text-sm px-4 text-center">Incapaz de comunicar com o hardware fotográfico.</p>
                        <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-ariBlue text-white rounded-full">Recarregar</button>
                    `;
                }
            }
        }

        function startVideoStream() {
            DOM.video.srcObject = appState.stream;
            DOM.video.onloadedmetadata = () => {
                DOM.video.play();
                DOM.loader.classList.add('hidden');
            };
        }

        function toggleCamera() {
            appState.facingMode = appState.facingMode === 'user' ? 'environment' : 'user';
            DOM.loader.classList.remove('hidden');
            initCamera();
        }

        // --- MOTOR DE COMPOSIÇÃO DE IMAGEM ---
        function takeSnapshot() {
            if (!appState.stream || appState.frames.length === 0) return;

            DOM.flash.style.opacity = '1';
            setTimeout(() => { DOM.flash.style.opacity = '0'; DOM.flash.style.transition = 'opacity 0.4s'; }, 50);
            setTimeout(() => { DOM.flash.style.transition = ''; }, 500);

            const ctx = DOM.canvas.getContext('2d');
            const targetWidth = 1080;
            const targetHeight = 1920;
            DOM.canvas.width = targetWidth;
            DOM.canvas.height = targetHeight;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            const vWidth = DOM.video.videoWidth;
            const vHeight = DOM.video.videoHeight;
            const vRatio = vWidth / vHeight;
            const tRatio = targetWidth / targetHeight;

            let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

            if (vRatio > tRatio) {
                drawHeight = targetHeight;
                drawWidth = drawHeight * vRatio;
                offsetX = (targetWidth - drawWidth) / 2;
            } else {
                drawWidth = targetWidth;
                drawHeight = drawWidth / vRatio;
                offsetY = (targetHeight - drawHeight) / 2;
            }

            ctx.save();
            if (appState.facingMode === 'user') {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }
            
            ctx.drawImage(DOM.video, offsetX, offsetY, drawWidth, drawHeight);
            ctx.restore();

            const frameImg = new Image();
            frameImg.crossOrigin = "anonymous";
            frameImg.onload = () => {
                ctx.drawImage(frameImg, 0, 0, targetWidth, targetHeight);
                appState.currentPhotoDataUri = DOM.canvas.toDataURL('image/jpeg', 0.95);
                showPreviewScreen();
            };
            frameImg.src = appState.frames[appState.activeIndex].uri;
        }

        function showPreviewScreen() {
            DOM.previewImage.src = appState.currentPhotoDataUri;
            DOM.previewScreen.classList.add('active');
            DOM.video.pause(); 
        }

        function discardPhoto() {
            appState.currentPhotoDataUri = null;
            DOM.previewImage.src = "";
            DOM.previewScreen.classList.remove('active');
            DOM.video.play(); 
        }

        function downloadPhoto() {
            if (!appState.currentPhotoDataUri) return;
            
            const a = document.createElement('a');
            a.download = `AriDeSa_DiaDaMae_${Date.now()}.jpg`;
            a.href = appState.currentPhotoDataUri;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            discardPhoto();
        }
    </script>
