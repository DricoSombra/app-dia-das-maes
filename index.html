<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colégio Ari de Sá - Dia das Mães</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ariBlue: '#00529b',
                        ariBlueDark: '#003a6e',
                        motherPink: '#e91e63',
                        motherPinkLight: '#fce4ec',
                        techGray: '#f3f4f6',
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS reset and specific configurations to avoid any green */
        body { margin: 0; overflow: hidden; background-color: #111827; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #videoElement {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #frameOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: fill; /* Ensures frame stretches to UI bounds */
            z-index: 10;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .top-bar, .bottom-bar {
            pointer-events: auto;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bottom-bar {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0) 100%);
            flex-direction: column;
            padding-bottom: 2rem;
        }

        .capture-btn {
            width: 70px; height: 70px;
            border-radius: 50%;
            background-color: white;
            border: 4px solid #00529b;
            box-shadow: 0 0 15px rgba(233, 30, 99, 0.5);
            transition: transform 0.1s;
            cursor: pointer;
        }
        .capture-btn:active { transform: scale(0.9); }

        .frames-carousel {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            width: 100%;
            scrollbar-width: none; /* Firefox */
        }
        .frames-carousel::-webkit-scrollbar { display: none; } /* Chrome */

        .frame-thumbnail {
            width: 60px; height: 80px;
            border-radius: 8px;
            border: 2px solid transparent;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
            background-color: rgba(255,255,255,0.2);
            transition: border-color 0.3s;
        }
        .frame-thumbnail.active {
            border-color: #e91e63;
            box-shadow: 0 0 10px rgba(233, 30, 99, 0.8);
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: none;
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Loading and Error states */
        #messageOverlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }
        .hidden { display: none !important; }

        /* Hidden raw SVGs used for generation */
        #svgTemplates { display: none; }
    </style>
</head>
<body>

    <!-- SVG Templates definitions. 
         Designed parametically to ensure modern look, NO GREEN, using Ari Blue and Mother's Day colors -->
    <div id="svgTemplates">
        <!-- 1. Minimalista Elegante -->
        <svg id="svg-frame-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <rect x="40" y="40" width="1000" height="1840" fill="none" stroke="#00529b" stroke-width="15" rx="30"/>
            <rect x="60" y="60" width="960" height="1800" fill="none" stroke="#e91e63" stroke-width="5" rx="20"/>
            <path d="M 0,0 L 200,0 L 0,200 Z" fill="#00529b" />
            <path d="M 1080,1920 L 880,1920 L 1080,1720 Z" fill="#e91e63" />
            <text x="540" y="1800" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#00529b" text-anchor="middle" letter-spacing="5">FELIZ DIA DAS MÃES</text>
            <text x="540" y="1860" font-family="Arial, sans-serif" font-size="35" font-weight="normal" fill="#e91e63" text-anchor="middle">COLÉGIO ARI DE SÁ</text>
        </svg>

        <!-- 2. Corações Tecnológicos -->
        <svg id="svg-frame-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#00529b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" />
                </linearGradient>
            </defs>
            <rect x="0" y="0" width="1080" height="150" fill="url(#grad1)" opacity="0.8"/>
            <rect x="0" y="1770" width="1080" height="150" fill="url(#grad1)" opacity="0.8"/>
            <!-- Geometric Hearts -->
            <path d="M100,80 L125,50 L150,80 L125,110 Z" fill="#ffffff" opacity="0.5"/>
            <path d="M980,80 L1005,50 L1030,80 L1005,110 Z" fill="#ffffff" opacity="0.5"/>
            <text x="540" y="100" font-family="Verdana, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">MÃE: NOSSA MAIOR INSPIRAÇÃO</text>
            <text x="540" y="1860" font-family="Verdana, sans-serif" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">COLÉGIO ARI DE SÁ CAVALCANTE</text>
        </svg>

        <!-- 3. Clássico Dourado -->
        <svg id="svg-frame-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <rect x="50" y="50" width="980" height="1820" fill="none" stroke="#FFD700" stroke-width="8"/>
            <rect x="70" y="70" width="940" height="1780" fill="none" stroke="#FFD700" stroke-width="2"/>
            <!-- Corners -->
            <path d="M 30,30 L 150,30 L 150,40 L 40,40 L 40,150 L 30,150 Z" fill="#00529b"/>
            <path d="M 1050,30 L 930,30 L 930,40 L 1040,40 L 1040,150 L 1050,150 Z" fill="#00529b"/>
            <path d="M 30,1890 L 150,1890 L 150,1880 L 40,1880 L 40,1770 L 30,1770 Z" fill="#e91e63"/>
            <path d="M 1050,1890 L 930,1890 L 930,1880 L 1040,1880 L 1040,1770 L 1050,1770 Z" fill="#e91e63"/>
            
            <rect x="150" y="1780" width="780" height="100" fill="#ffffff" opacity="0.9" rx="50"/>
            <text x="540" y="1845" font-family="Georgia, serif" font-size="45" font-weight="bold" fill="#00529b" text-anchor="middle">Amor que Transforma - Ari de Sá</text>
        </svg>

        <!-- 4. Estilo Polaroid -->
        <svg id="svg-frame-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <!-- Top, Left, Right borders -->
            <rect x="0" y="0" width="1080" height="60" fill="#ffffff"/>
            <rect x="0" y="0" width="60" height="1920" fill="#ffffff"/>
            <rect x="1020" y="0" width="60" height="1920" fill="#ffffff"/>
            <!-- Bottom large border -->
            <rect x="0" y="1600" width="1080" height="320" fill="#ffffff"/>
            
            <!-- Tape effect top -->
            <rect x="440" y="20" width="200" height="60" fill="#f3f4f6" opacity="0.8" transform="rotate(-2 540 50)"/>
            
            <text x="540" y="1720" font-family="'Comic Sans MS', cursive, sans-serif" font-size="80" font-weight="bold" fill="#e91e63" text-anchor="middle">Feliz Dia das Mães!</text>
            <text x="540" y="1820" font-family="Arial, sans-serif" font-size="40" fill="#00529b" text-anchor="middle">Colégio Ari de Sá Cavalcante - 2026</text>
            <circle cx="540" cy="1860" r="10" fill="#00529b"/>
        </svg>

        <!-- 5. Azul Cinematico com degradê -->
        <svg id="svg-frame-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <rect x="0" y="0" width="1080" height="250" fill="url(#gradTop)"/>
            <rect x="0" y="1670" width="1080" height="250" fill="url(#gradBottom)"/>
            <defs>
                <linearGradient id="gradTop" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#00529b;stop-opacity:0.9" />
                    <stop offset="100%" style="stop-color:#00529b;stop-opacity:0" />
                </linearGradient>
                <linearGradient id="gradBottom" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" style="stop-color:#003a6e;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#003a6e;stop-opacity:0" />
                </linearGradient>
            </defs>
            <text x="540" y="1820" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#ffffff" text-anchor="middle">ESPECIAL DIA DAS MÃES</text>
            <text x="540" y="1880" font-family="Arial, sans-serif" font-size="30" fill="#e91e63" text-anchor="middle">COLÉGIO ARI DE SÁ</text>
        </svg>

        <!-- 6. Neon Moderno -->
        <svg id="svg-frame-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <rect x="40" y="40" width="1000" height="1840" fill="none" stroke="#e91e63" stroke-width="10" rx="40" opacity="0.8" filter="drop-shadow(0 0 10px #e91e63)"/>
            <rect x="60" y="60" width="960" height="1800" fill="none" stroke="#00529b" stroke-width="6" rx="30" opacity="0.8" filter="drop-shadow(0 0 10px #00529b)"/>
            
            <rect x="140" y="1750" width="800" height="120" fill="#111827" opacity="0.7" rx="60" stroke="#e91e63" stroke-width="2"/>
            <text x="540" y="1830" font-family="Courier New, monospace" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">#MaeAriDeSa</text>
        </svg>

        <!-- 7. Floral Abstrato (Azul e Rosa - SEM VERDE) -->
        <svg id="svg-frame-7" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <!-- Top Left Abstract Flower -->
            <circle cx="100" cy="100" r="150" fill="#e91e63" opacity="0.3" filter="blur(20px)"/>
            <circle cx="150" cy="50" r="100" fill="#00529b" opacity="0.4" filter="blur(15px)"/>
            
            <!-- Bottom Right Abstract Flower -->
            <circle cx="980" cy="1820" r="200" fill="#00529b" opacity="0.3" filter="blur(20px)"/>
            <circle cx="900" cy="1850" r="120" fill="#e91e63" opacity="0.4" filter="blur(15px)"/>

            <rect x="30" y="30" width="1020" height="1860" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
            <text x="540" y="1850" font-family="Trebuchet MS, sans-serif" font-size="65" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="drop-shadow(2px 4px 6px black)">MÃE, MEU MAIOR EXEMPLO</text>
            <text x="540" y="1890" font-family="Trebuchet MS, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="drop-shadow(1px 2px 3px black)">ARI DE SÁ</text>
        </svg>
    </div>

    <!-- Application UI -->
    <div class="camera-container">
        
        <!-- Video Feed -->
        <video id="videoElement" autoplay playsinline></video>
        
        <!-- Active Frame Overlay -->
        <img id="frameOverlay" src="" alt="Moldura">

        <!-- User Interface Layer -->
        <div class="ui-layer">
            
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="flex items-center gap-3">
                    <!-- Utilizando src genérico, mas pode ser substituido pelo ./logo.png local -->
                    <img src="./logo.png" alt="Ari de Sá" class="h-10 bg-white rounded p-1 object-contain" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgNjAiPjx0ZXh0IHk9IjM1IiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiMwMDUyOWIiIGZvbnQtd2VpZ2h0PSJib2xkIj5BcmkgZGUgU8OhPC90ZXh0Pjwvc3ZnPg=='">
                </div>
                <div class="flex gap-2">
                    <button class="icon-btn" onclick="toggleCamera()" aria-label="Trocar Câmera">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <!-- Input oculto para upload de nova moldura -->
                    <input type="file" id="uploadFrameInput" accept="image/png, image/svg+xml" class="hidden" onchange="handleCustomFrameUpload(event)">
                    <button class="icon-btn bg-ariBlue" onclick="document.getElementById('uploadFrameInput').click()" aria-label="Adicionar Moldura" title="Adicionar Moldura Personalizada">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <!-- Bottom Bar -->
            <div class="bottom-bar">
                
                <!-- Frames Carousel -->
                <div class="w-full mb-4">
                    <p class="text-white text-xs mb-2 text-center opacity-80 font-semibold tracking-wider">SELECIONE A MOLDURA</p>
                    <div class="frames-carousel" id="framesCarousel">
                        <!-- Thumbnails injetadas via JS -->
                    </div>
                </div>

                <!-- Capture Action -->
                <div class="flex justify-center w-full relative">
                    <button class="capture-btn" onclick="capturePhoto()" aria-label="Tirar Foto"></button>
                </div>

            </div>
        </div>
    </div>

    <!-- Hidden Canvas for Image Processing -->
    <canvas id="photoCanvas" class="hidden"></canvas>

    <!-- Overlay Messages -->
    <div id="messageOverlay">
        <i class="fas fa-camera text-4xl mb-4 text-ariBlue"></i>
        <h2 class="text-xl font-bold mb-2">Iniciando Câmera...</h2>
        <p class="text-sm text-gray-300">Por favor, permita o acesso à câmera do seu dispositivo para tirar a foto.</p>
    </div>

    <script>
        // -- ESTADOS E VARIÁVEIS GLOBAIS --
        let videoStream = null;
        let currentFacingMode = 'environment'; // 'environment' (traseira) ou 'user' (frontal)
        let framesData = []; // Armazena as URIs das molduras
        let activeFrameIndex = 0;

        const videoEl = document.getElementById('videoElement');
        const overlayEl = document.getElementById('frameOverlay');
        const carouselEl = document.getElementById('framesCarousel');
        const msgOverlay = document.getElementById('messageOverlay');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');

        // -- INICIALIZAÇÃO --
        window.addEventListener('DOMContentLoaded', () => {
            generateFramesFromSVG();
            renderCarousel();
            selectFrame(0);
            startCamera();
        });

        // -- PROCESSAMENTO DAS MOLDURAS (SVG to DataURI) --
        function generateFramesFromSVG() {
            const svgElements = document.querySelectorAll('#svgTemplates svg');
            svgElements.forEach(svg => {
                const svgString = new XMLSerializer().serializeToString(svg);
                // Codificação segura para URL (sem base64, aderindo a requisitos rigorosos)
                const encodedSVG = encodeURIComponent(svgString);
                const dataUri = `data:image/svg+xml;charset=utf-8,${encodedSVG}`;
                framesData.push(dataUri);
            });
        }

        // -- RENDERIZAÇÃO DA UI (Carrossel) --
        function renderCarousel() {
            carouselEl.innerHTML = '';
            framesData.forEach((dataUri, index) => {
                const img = document.createElement('img');
                img.src = dataUri;
                img.className = `frame-thumbnail ${index === activeFrameIndex ? 'active' : ''}`;
                img.onclick = () => selectFrame(index);
                carouselEl.appendChild(img);
            });
        }

        function selectFrame(index) {
            activeFrameIndex = index;
            overlayEl.src = framesData[index];
            
            // Atualizar classes CSS do carrossel
            Array.from(carouselEl.children).forEach((child, i) => {
                if (i === index) child.classList.add('active');
                else child.classList.remove('active');
            });
        }

        // -- UPLOAD DE MOLDURA CUSTOMIZADA --
        function handleCustomFrameUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const newFrameUri = e.target.result;
                framesData.push(newFrameUri); // Adiciona ao array de molduras
                renderCarousel(); // Re-renderiza o carrossel
                selectFrame(framesData.length - 1); // Seleciona a nova moldura
                
                // Limpar input
                event.target.value = '';
            };
            reader.readAsDataURL(file);
        }

        // -- WEBRTC: CONTROLE DE CÂMERA --
        async function startCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: currentFacingMode,
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoEl.srcObject = videoStream;
                msgOverlay.classList.add('hidden'); // Esconder mensagem de carregamento
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                msgOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl mb-4 text-motherPink"></i>
                    <h2 class="text-xl font-bold mb-2">Erro de Acesso</h2>
                    <p class="text-sm text-gray-300">Não foi possível acessar a câmera. Verifique as permissões do seu navegador.</p>
                `;
            }
        }

        function toggleCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            msgOverlay.classList.remove('hidden');
            msgOverlay.querySelector('h2').innerText = "Trocando câmera...";
            startCamera();
        }

        // -- PROCESSAMENTO DE IMAGEM: CAPTURA E DOWNLOAD --
        function capturePhoto() {
            if (!videoStream) return;

            // Flash effect
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0'; flash.style.left = '0';
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = 'white';
            flash.style.zIndex = '100';
            flash.style.transition = 'opacity 0.5s';
            document.body.appendChild(flash);
            
            setTimeout(() => { flash.style.opacity = '0'; }, 50);
            setTimeout(() => { flash.remove(); }, 500);

            // 1. Configurar o Canvas com a resolução real do vídeo
            const videoWidth = videoEl.videoWidth;
            const videoHeight = videoEl.videoHeight;
            canvas.width = videoWidth;
            canvas.height = videoHeight;

            // 2. Se for câmera frontal, espelhar a imagem no canvas
            if (currentFacingMode === 'user') {
                ctx.translate(videoWidth, 0);
                ctx.scale(-1, 1);
            }

            // 3. Desenhar o frame atual do vídeo
            ctx.drawImage(videoEl, 0, 0, videoWidth, videoHeight);

            // Reverter espelhamento para não espelhar a moldura/textos
            if (currentFacingMode === 'user') {
                ctx.translate(videoWidth, 0);
                ctx.scale(-1, 1);
            }

            // 4. Desenhar a moldura (overlay)
            const frameImage = new Image();
            frameImage.crossOrigin = "anonymous"; // Prevenir Taint issues
            
            frameImage.onload = () => {
                // Preencher o canvas com a moldura, mantendo proporção ou esticando.
                // Como as molduras são 1080x1920 (retrato), precisamos ajustá-las.
                ctx.drawImage(frameImage, 0, 0, videoWidth, videoHeight);

                // 5. Iniciar o download local (Privacy by Design - sem servidor)
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const link = document.createElement('a');
                link.download = `ari-de-sa-dia-das-maes-${new Date().getTime()}.jpg`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            frameImage.src = framesData[activeFrameIndex];
        }
    </script>
</body>
</html>
