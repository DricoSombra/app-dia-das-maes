<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colégio Ari de Sá - Dia das Mães</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ariBlue: '#00529b',
                        motherPink: '#e91e63',
                        darkBg: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Fundamentos de Reset e UI Moderna */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: system-ui, -apple-system, sans-serif; touch-action: none; }
        
        /* Containers Principais */
        .viewport-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #videoElement { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: filter 0.3s ease; }
        #frameOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 10; pointer-events: none; }
        
        /* Glassmorphism UI - Ocultado na captura, visível na interação */
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            transition: all 0.3s ease;
        }
        
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 20; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%); }
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; z-index: 20; }

        /* Botão de Captura Refinado (Estilo Apple/Moderno) */
        .shutter-btn-container { display: flex; justify-content: center; align-items: center; padding: 1.5rem 0; width: 100%; }
        .shutter-btn {
            width: 76px; height: 76px; border-radius: 50%;
            background-color: transparent; border: 4px solid white;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shutter-btn-inner {
            width: 60px; height: 60px; border-radius: 50%;
            background-color: white; transition: all 0.15s ease;
        }
        .shutter-btn:active .shutter-btn-inner { transform: scale(0.85); background-color: #f1f1f1; }

        /* Carrossel de Molduras Otimizado */
        .carousel-container { padding: 1rem 1rem 0 1rem; width: 100%; }
        .frames-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
            scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none;
        }
        .frames-scroll::-webkit-scrollbar { display: none; }
        
        .thumb-wrapper { position: relative; flex-shrink: 0; transition: transform 0.2s ease; }
        .frame-thumb {
            width: 64px; height: 96px; border-radius: 12px; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .thumb-wrapper.active .frame-thumb {
            border-color: #e91e63;
            box-shadow: 0 0 0 2px #0f172a, 0 0 0 4px #e91e63;
            transform: translateY(-4px);
        }

        /* Botões de Ação e Admin */
        .action-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px);
            color: white; display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem;
            cursor: pointer; transition: background 0.2s;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.3); }
        
        .delete-badge {
            position: absolute; top: -6px; right: -6px;
            width: 24px; height: 24px; border-radius: 50%;
            background-color: #ef4444; color: white; display: none;
            justify-content: center; align-items: center; font-size: 10px;
            cursor: pointer; border: 2px solid #0f172a; z-index: 30;
        }
        .admin-mode .delete-badge { display: flex; }
        .admin-mode .thumb-wrapper.default-frame .delete-badge { display: none; /* Impede apagar frames originais */ }
        
        .admin-panel {
            display: none; padding: 0.5rem 1rem; background: rgba(0, 82, 155, 0.9);
            color: white; font-size: 0.8rem; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .admin-mode .admin-panel { display: flex; }

        /* Feedback Visual */
        #flashEffect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; opacity: 0; pointer-events: none; }
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.5s; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        /* Definições de SVG Ocultas para Serialização */
        #svgRepository { display: none; }
    </style>
</head>
<body>

    <!-- REPOSITÓRIO DE MOLDURAS (SVGs de Alta Fidelidade) -->
    <!-- Design rigosoramente estruturado sem verde. Uso de Azul Ari (#00529b) e Magenta/Rosa -->
    <div id="svgRepository">
        
        <!-- 0. Elegância Fluida (Moderno, Glassmorphism fake, Limpo) -->
        <svg id="svg-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <linearGradient id="gradFluid1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00529b" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="#e91e63" stop-opacity="0.6"/>
                </linearGradient>
                <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="40" />
                </filter>
            </defs>
            <!-- Formas orgânicas nos cantos -->
            <path d="M0,0 L400,0 C350,150 200,300 0,350 Z" fill="url(#gradFluid1)" />
            <path d="M1080,1920 L680,1920 C730,1770 880,1620 1080,1570 Z" fill="url(#gradFluid1)" />
            <!-- Borda ultra fina de elegância -->
            <rect x="40" y="40" width="1000" height="1840" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" rx="40"/>
            <rect x="0" y="1700" width="1080" height="220" fill="rgba(0, 82, 155, 0.85)" />
            <text x="540" y="1800" font-family="system-ui, -apple-system, sans-serif" font-size="65" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">FELIZ DIA DAS MÃES</text>
            <text x="540" y="1855" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" fill="#fce4ec" text-anchor="middle" letter-spacing="6">COLÉGIO ARI DE SÁ</text>
        </svg>

        <!-- 1. Instax / Polaroid Minimalista -->
        <svg id="svg-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
                    <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
                </filter>
            </defs>
            <!-- Moldura Branca Estilo Polaroid com Sombra -->
            <path d="M40,150 L1040,150 L1040,1850 L40,1850 Z" fill="none"/> <!-- Hole -->
            <path d="M0,0 L1080,0 L1080,1920 L0,1920 Z M40,150 L40,1550 L1040,1550 L1040,150 Z" fill="#ffffff" filter="url(#dropShadow)"/>
            <text x="540" y="1720" font-family="'Brush Script MT', 'Comic Sans MS', cursive, sans-serif" font-size="110" font-weight="normal" fill="#e91e63" text-anchor="middle">Te amo, Mãe!</text>
            <text x="540" y="1830" font-family="system-ui, -apple-system, sans-serif" font-size="35" font-weight="600" fill="#00529b" text-anchor="middle" letter-spacing="4">COLÉGIO ARI DE SÁ CAVALCANTE</text>
        </svg>

        <!-- 2. Capa de Revista (Cinemático / Editorial) -->
        <svg id="svg-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <rect x="0" y="0" width="1080" height="1920" fill="none" stroke="#00529b" stroke-width="40" />
            <rect x="20" y="20" width="1040" height="1880" fill="none" stroke="#ffffff" stroke-width="4" />
            <!-- Título Gigante Transparente com Outline -->
            <text x="540" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="280" font-weight="900" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="4" text-anchor="middle" letter-spacing="-5">MÃE</text>
            <rect x="0" y="1650" width="1080" height="270" fill="url(#gradBottomDark)" />
            <defs>
                <linearGradient id="gradBottomDark" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#000000" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
                </linearGradient>
            </defs>
            <text x="80" y="1780" font-family="system-ui, -apple-system, sans-serif" font-size="75" font-weight="800" fill="#ffffff" text-anchor="start">AMOR QUE</text>
            <text x="80" y="1850" font-family="system-ui, -apple-system, sans-serif" font-size="75" font-weight="800" fill="#e91e63" text-anchor="start">INSPIRA</text>
            <text x="1000" y="1840" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#ffffff" text-anchor="end" letter-spacing="2">ARI DE SÁ • 2026</text>
        </svg>

        <!-- 3. Neon Cyberpunk / High-Tech Moderno -->
        <svg id="svg-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <defs>
                <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <!-- Linhas de grade sutis -->
            <line x1="100" y1="0" x2="100" y2="1920" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <line x1="980" y1="0" x2="980" y2="1920" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            
            <path d="M50,100 L100,50 L980,50 L1030,100" fill="none" stroke="#e91e63" stroke-width="6" filter="url(#neonPink)"/>
            <path d="M50,1820 L100,1870 L980,1870 L1030,1820" fill="none" stroke="#00529b" stroke-width="6" filter="url(#neonBlue)"/>
            
            <rect x="240" y="1740" width="600" height="90" rx="45" fill="#1e293b" opacity="0.9" stroke="#e91e63" stroke-width="2" filter="url(#neonPink)"/>
            <text x="540" y="1805" font-family="Courier New, monospace" font-size="45" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">#MaeAriDeSa</text>
        </svg>

        <!-- 4. Arte Deco (Clássico Premium Dourado/Azul) -->
        <svg id="svg-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
            <!-- Bordas Duplas Douradas e Azuis -->
            <rect x="60" y="60" width="960" height="1800" fill="none" stroke="#D4AF37" stroke-width="4"/>
            <rect x="80" y="80" width="920" height="1760" fill="none" stroke="#00529b" stroke-width="2"/>
            <!-- Ornamentos de Canto Art Deco -->
            <path d="M 60,160 L 160,160 L 160,60" fill="none" stroke="#D4AF37" stroke-width="8"/>
            <path d="M 1020,160 L 920,160 L 920,60" fill="none" stroke="#D4AF37" stroke-width="8"/>
            <path d="M 60,1760 L 160,1760 L 160,1860" fill="none" stroke="#D4AF37" stroke-width="8"/>
            <path d="M 1020,1760 L 920,1760 L 920,1860" fill="none" stroke="#D4AF37" stroke-width="8"/>
            
            <rect x="150" y="1720" width="780" height="160" fill="#00529b" opacity="0.95" />
            <text x="540" y="1780" font-family="'Times New Roman', Times, serif" font-size="55" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="3">INCONDICIONAL</text>
            <text x="540" y="1840" font-family="'Times New Roman', Times, serif" font-size="30" fill="#ffffff" text-anchor="middle" letter-spacing="8">COLÉGIO ARI DE SÁ</text>
        </svg>
    </div>

    <!-- Interface Principal -->
    <div class="viewport-container">
        
        <!-- Stream de Vídeo -->
        <video id="videoElement" autoplay playsinline muted></video>
        <!-- Overlay Renderizado -->
        <img id="frameOverlay" src="" alt="Moldura Ativa">

        <!-- Barra Superior -->
        <div class="top-bar">
            <!-- Espaço para o Logo (Utilizando fallback SVG caso logo.png não carregue na máquina local) -->
            <img src="./logo.png" alt="Logo Ari de Sá" class="h-10 object-contain drop-shadow-md" 
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgNTAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iNTAiIGZpbGw9InRyYW5zcGFyZW50Ii8+PHRleHQgeD0iMTAiIHk9IjM1IiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjgiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjZmZmZmZmIj5BcmkgZGUgU8OhPC90ZXh0Pjwvc3ZnPg=='">
            
            <div class="flex gap-3">
                <button class="action-btn" onclick="toggleCamera()" aria-label="Inverter Câmera">
                    <i class="fas fa-camera-rotate"></i>
                </button>
                <button class="action-btn" onclick="toggleAdminMode()" id="adminToggleBtn" aria-label="Modo Gestão" title="Adicionar/Remover Molduras">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>
        </div>

        <!-- Barra Inferior e Controles -->
        <div class="bottom-bar glass-panel" id="bottomBarUI">
            
            <!-- Painel Administrativo (Oculto por padrão) -->
            <div class="admin-panel" id="adminPanel">
                <span class="font-bold tracking-wide uppercase"><i class="fas fa-shield-alt mr-2"></i>Modo Gestão Ativo</span>
                <div class="flex gap-2">
                    <button class="px-4 py-1.5 bg-motherPink text-white rounded-full font-bold text-xs uppercase tracking-wider hover:bg-pink-600 transition" onclick="triggerFileInput()">
                        <i class="fas fa-plus mr-1"></i> Nova Moldura
                    </button>
                    <input type="file" id="customFrameInput" accept="image/png" class="hidden" onchange="handleCustomFrame(event)">
                </div>
            </div>

            <!-- Carrossel -->
            <div class="carousel-container">
                <div class="text-center mb-3">
                    <span class="text-xs text-white/70 uppercase tracking-widest font-semibold drop-shadow-md" id="carouselLabel">Deslize para escolher</span>
                </div>
                <div class="frames-scroll" id="framesScroll">
                    <!-- Gerado via JavaScript -->
                </div>
            </div>

            <!-- Botão de Disparo -->
            <div class="shutter-btn-container">
                <div class="shutter-btn" onclick="capturePhoto()">
                    <div class="shutter-btn-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Elementos Ocultos de Processamento -->
    <canvas id="renderCanvas" class="hidden"></canvas>
    <div id="flashEffect"></div>

    <!-- Tela de Carregamento/Permissão -->
    <div class="loader-overlay" id="loaderOverlay">
        <i class="fas fa-camera text-5xl mb-4 text-ariBlue animate-pulse"></i>
        <h2 class="text-2xl font-bold mb-2">Preparando Câmera</h2>
        <p class="text-sm text-gray-400 max-w-xs text-center">Conceda permissão no seu navegador para registrar este momento.</p>
    </div>

    <script>
        /**
         * ARQUITETURA E GERENCIAMENTO DE ESTADO (State Management)
         * O array 'appState.frames' é a fonte de verdade.
         * Ele é composto pelos SVGs nativos (imutáveis) + Base64 armazenados no LocalStorage (mutáveis).
         */
        const appState = {
            stream: null,
            facingMode: 'environment', // Traseira como padrão
            isAdmin: false,
            activeIndex: 0,
            frames: [] // { id: string, type: 'default'|'custom', uri: string }
        };

        const DOM = {
            video: document.getElementById('videoElement'),
            overlay: document.getElementById('frameOverlay'),
            scroll: document.getElementById('framesScroll'),
            loader: document.getElementById('loaderOverlay'),
            body: document.body,
            flash: document.getElementById('flashEffect'),
            canvas: document.getElementById('renderCanvas'),
            fileInput: document.getElementById('customFrameInput')
        };

        const STORAGE_KEY = '@AriDeSa:CustomFrames_v1';

        // --- INICIALIZAÇÃO DA APLICAÇÃO ---
        window.addEventListener('DOMContentLoaded', async () => {
            initializeFrames();
            renderCarousel();
            selectFrame(0);
            await initCamera();
        });

        // --- GESTÃO DE DADOS (LOCAL STORAGE E SVGS) ---
        function initializeFrames() {
            appState.frames = [];
            
            // 1. Carregar SVGs Nativos do DOM (Garante dependência zero de arquivos externos)
            const svgs = document.querySelectorAll('#svgRepository svg');
            svgs.forEach((svg, index) => {
                const svgString = new XMLSerializer().serializeToString(svg);
                const encodedData = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svgString)}`;
                appState.frames.push({
                    id: `default-${index}`,
                    type: 'default',
                    uri: encodedData
                });
            });

            // 2. Carregar Molduras Customizadas do LocalStorage (Modo Admin Persistente)
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const customFrames = JSON.parse(stored);
                    if (Array.isArray(customFrames)) {
                        appState.frames = [...appState.frames, ...customFrames];
                    }
                }
            } catch (e) {
                console.warn("Erro ao acessar LocalStorage. Apenas frames padrão disponíveis.", e);
            }
        }

        function saveCustomFrames() {
            // Salva apenas os frames cujo tipo seja 'custom'
            const customOnly = appState.frames.filter(f => f.type === 'custom');
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(customOnly));
            } catch (e) {
                alert("Memória do navegador cheia. Não foi possível salvar a nova moldura.");
            }
        }

        // --- RENDERIZAÇÃO DA INTERFACE ---
        function renderCarousel() {
            DOM.scroll.innerHTML = '';
            
            appState.frames.forEach((frame, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `thumb-wrapper ${frame.type === 'default' ? 'default-frame' : 'custom-frame'} ${index === appState.activeIndex ? 'active' : ''}`;
                
                const img = document.createElement('img');
                img.src = frame.uri;
                img.className = 'frame-thumb';
                img.onclick = () => selectFrame(index);
                
                // Badge de exclusão (apenas operante no admin e em frames custom)
                const delBadge = document.createElement('div');
                delBadge.className = 'delete-badge';
                delBadge.innerHTML = '<i class="fas fa-times"></i>';
                delBadge.onclick = (e) => {
                    e.stopPropagation(); // Impede de selecionar ao clicar em excluir
                    deleteFrame(frame.id);
                };

                wrapper.appendChild(img);
                wrapper.appendChild(delBadge);
                DOM.scroll.appendChild(wrapper);
            });
        }

        function selectFrame(index) {
            // Garante que o índice exista (importante após exclusões)
            if (index < 0 || index >= appState.frames.length) index = 0;
            
            appState.activeIndex = index;
            DOM.overlay.src = appState.frames[index].uri;
            
            // Atualizar classes visuais
            Array.from(DOM.scroll.children).forEach((child, i) => {
                child.classList.toggle('active', i === index);
                if (i === index) child.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        }

        // --- FUNÇÕES DE ADMINISTRAÇÃO ---
        function toggleAdminMode() {
            appState.isAdmin = !appState.isAdmin;
            DOM.body.classList.toggle('admin-mode', appState.isAdmin);
            
            const btn = document.getElementById('adminToggleBtn');
            if (appState.isAdmin) {
                btn.classList.add('bg-ariBlue', 'text-white');
                btn.classList.remove('bg-white/15');
            } else {
                btn.classList.remove('bg-ariBlue', 'text-white');
                btn.classList.add('bg-white/15');
            }
        }

        function triggerFileInput() {
            DOM.fileInput.click();
        }

        function handleCustomFrame(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Rigor: Validar se é imagem (preferencialmente PNG com transparência)
            if (!file.type.startsWith('image/')) {
                alert("Por favor, envie um arquivo de imagem válido.");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const newFrame = {
                    id: `custom-${Date.now()}`,
                    type: 'custom',
                    uri: e.target.result // Base64 Data URI
                };
                
                appState.frames.push(newFrame);
                saveCustomFrames();
                renderCarousel();
                selectFrame(appState.frames.length - 1); // Foca na nova moldura
            };
            reader.readAsDataURL(file);
            event.target.value = ''; // Reseta o input
        }

        function deleteFrame(id) {
            if (confirm("Tem certeza que deseja remover esta moldura?")) {
                const index = appState.frames.findIndex(f => f.id === id);
                if (index > -1) {
                    appState.frames.splice(index, 1);
                    saveCustomFrames();
                    renderCarousel();
                    selectFrame(0); // Volta para a primeira após excluir
                }
            }
        }

        // --- HARDWARE E WEBRTC ---
        async function initCamera() {
            if (appState.stream) {
                appState.stream.getTracks().forEach(track => track.stop());
            }

            // Constraints rigorosas para priorizar resolução HD e proporção de retrato
            const idealConstraints = {
                video: {
                    facingMode: appState.facingMode,
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                // Tenta primeiro com as constraints ideais
                appState.stream = await navigator.mediaDevices.getUserMedia(idealConstraints);
                startVideoStream();
            } catch (err) {
                console.warn("Falha ao acessar câmera com constraints específicas. Tentando fallback genérico...", err);
                
                try {
                    // Fallback: Tenta acessar qualquer câmera disponível sem restrições
                    const fallbackConstraints = { video: true, audio: false };
                    appState.stream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    startVideoStream();
                } catch (fallbackErr) {
                    console.error("WebRTC Error (Fallback):", fallbackErr);
                    showCameraError();
                }
            }
        }

        function startVideoStream() {
            DOM.video.srcObject = appState.stream;
            
            // Aguarda o vídeo estar pronto para tocar antes de ocultar o loader
            DOM.video.onloadedmetadata = () => {
                DOM.video.play();
                DOM.loader.classList.add('hidden');
            };
        }

        function showCameraError() {
            DOM.loader.innerHTML = `
                <i class="fas fa-exclamation-triangle text-5xl mb-4 text-motherPink"></i>
                <h2 class="text-2xl font-bold mb-2 text-center">Câmera Indisponível</h2>
                <p class="text-sm text-gray-400 text-center px-4">Não foi possível encontrar uma câmera ou o acesso foi negado. Se estiver no computador, verifique se a webcam está conectada.</p>
                <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-ariBlue text-white rounded-full font-bold">Tentar Novamente</button>
            `;
            DOM.loader.classList.remove('hidden');
        }

        function toggleCamera() {
            appState.facingMode = appState.facingMode === 'user' ? 'environment' : 'user';
            DOM.loader.classList.remove('hidden');
            DOM.loader.querySelector('h2').innerText = "Invertendo Câmera...";
            initCamera();
        }

        // --- PROCESSAMENTO DA CAPTURA (ENGINE GRÁFICA) ---
        function capturePhoto() {
            if (!appState.stream) return;

            // 1. Feedback Visceral (Flash)
            DOM.flash.style.opacity = '1';
            setTimeout(() => { DOM.flash.style.opacity = '0'; DOM.flash.style.transition = 'opacity 0.5s ease-out'; }, 50);
            setTimeout(() => { DOM.flash.style.transition = ''; }, 600);

            // 2. Setup do Contexto Gráfico (Canvas 2D)
            const ctx = DOM.canvas.getContext('2d');
            
            // Forçamos a saída para uma proporção 9:16 (Story format padrão) para garantir consistência
            const targetWidth = 1080;
            const targetHeight = 1920;
            DOM.canvas.width = targetWidth;
            DOM.canvas.height = targetHeight;

            // Preenchimento de fundo preto por segurança (caso o vídeo não preencha tudo)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            // 3. Cálculo de Recorte da Câmera (Object-fit: cover via JavaScript)
            // Precisamos desenhar o vídeo cortando as sobras para preencher o canvas 1080x1920
            const vWidth = DOM.video.videoWidth;
            const vHeight = DOM.video.videoHeight;
            const vRatio = vWidth / vHeight;
            const tRatio = targetWidth / targetHeight;

            let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

            if (vRatio > tRatio) {
                // Vídeo é mais largo que o target
                drawHeight = targetHeight;
                drawWidth = drawHeight * vRatio;
                offsetX = (targetWidth - drawWidth) / 2;
            } else {
                // Vídeo é mais estreito ou igual
                drawWidth = targetWidth;
                drawHeight = drawWidth / vRatio;
                offsetY = (targetHeight - drawHeight) / 2;
            }

            // 4. Tratamento de Espelhamento (Câmera Frontal)
            ctx.save();
            if (appState.facingMode === 'user') {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }
            
            // Desenha a imagem da câmera
            ctx.drawImage(DOM.video, offsetX, offsetY, drawWidth, drawHeight);
            ctx.restore(); // Restaura para não espelhar a moldura/textos

            // 5. Compositing da Moldura
            const frameImg = new Image();
            frameImg.crossOrigin = "anonymous";
            
            frameImg.onload = () => {
                ctx.drawImage(frameImg, 0, 0, targetWidth, targetHeight);

                // 6. Output Final (Download Automático)
                const jpegData = DOM.canvas.toDataURL('image/jpeg', 0.95); // 95% Quality
                triggerDownload(jpegData);
            };

            frameImg.onerror = () => {
                alert("Ocorreu um erro ao processar a moldura gráfica.");
            }

            frameImg.src = appState.frames[appState.activeIndex].uri;
        }

        function triggerDownload(dataUri) {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const a = document.createElement('a');
            a.download = `AriDeSa_DiaDasMaes_${timestamp}.jpg`;
            a.href = dataUri;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
